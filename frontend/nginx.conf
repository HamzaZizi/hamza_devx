server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies to the backend service.
    # Frontend runs in namespace todo-frontend, backend Service lives in
    # todo-backend, so we must use the cross-namespace FQDN:
    #   <service-name>.<namespace>.svc.cluster.local
    # The backend Service is named "web-todo-backend-svc" by the Harness
    # Deployment template (web-<values.name>-svc).
    location /api/ {
        proxy_pass http://web-todo-backend-svc.todo-backend.svc.cluster.local:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
